# ---------------------------------------------------------------------------
# Cluster configuration file
#
# HOW TO USE:
#   1. Copy this file:   cp config.example.yaml config.yaml
#   2. Edit config.yaml with your real node names / IPs / users.
#   3. Run the scripts. They read config.yaml automatically
#      (override the path with:  CONFIG_FILE=/path/to/file.yaml ./script.sh)
#
# NOTE: config.yaml is git-ignored so your site details never get committed.
#       Do NOT put passwords in here — the scripts prompt for them instead.
# ---------------------------------------------------------------------------

cluster:

  # Existing admin account on the master node
  master_user: <master-user>

  # Non-privileged user created on each worker node
  worker_user: <worker-user>

# List of master nodes. Add one "- name: / ip:" pair per master node
masters:
  - name: <master-name>
    ip: <master-ip>

# List of worker nodes. Add one entry per worker node
workers:
  - name: <worker-1-name>
    ip: <worker-1-ip>
  - name: <worker-2-name>
    ip: <worker-2-ip>

# JupyterHub deployment settings. These are injected into the Helm release by
# jupyterhub/create.sh, so they do NOT need to be duplicated in
# jupyterhub/config.yaml.
jupyterhub:

  # Public hostname. Must match the CN/SAN of the TLS certificate.
  hostname: <jupyterhub-hostname>

  # Container image used for the user notebook servers.
  image_name: <notebook-image>
  image_tag: <notebook-image-tag>

# JupyterHub administrator accounts (one "- <user>" per line)
admins:
  - <admin-user>

# Users allowed to log in (one "- <user>" per line)
users:
  - <user-1>
  - <user-2>
