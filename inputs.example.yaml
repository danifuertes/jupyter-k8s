# ---------------------------------------------------------------------------
# Cluster inputs file
#
# HOW TO USE:
#   1. Copy this file:   cp inputs.example.yaml inputs.yaml
#   2. Edit inputs.yaml with your real node names / IPs / users.
#   3. Run the scripts. They read inputs.yaml automatically
#      (override the path with:  CONFIG_FILE=/path/to/file.yaml ./script.sh)
#
# NOTE: inputs.yaml is git-ignored so your site details never get committed.
# ---------------------------------------------------------------------------

# Cluster settings
cluster:
  master_user: <master-user>        # Existing admin account on the master node
  worker_user: <worker-user>        # Non-privileged user created on each worker node
  masters:                          # List of master nodes. One "- name: / ip:" pair per node
    - name: <master-name>
      ip: <master-ip>
  workers:                          # List of worker nodes. One entry per worker node
    - name: <worker-1-name>
      ip: <worker-1-ip>
    - name: <worker-2-name>
      ip: <worker-2-ip>
  nfs:                              # NFS server (can be equal to a master node)
    name: <nfs-name>
    ip: <nfs-ip>

# JupyterHub Helm chart values
# jupyterhub/update-config.sh copies this section into jupyterhub/config.yaml
#
# Introduction to YAML:     https://www.youtube.com/watch?v=cdLNKUoMc6c
# Chart config reference:   https://zero-to-jupyterhub.readthedocs.io/en/stable/resources/reference.html
# Chart default values:     https://github.com/jupyterhub/zero-to-jupyterhub-k8s/blob/HEAD/jupyterhub/values.yaml
# Available chart versions: https://hub.jupyter.org/helm-chart/
jupyterhub:

  # Ingress mode
  proxy:
    service:
      type: NodePort
      nodePorts:
        https: 30000  # Optional: specify a port in the range 30000-32767

    https:
      enabled: true
      hosts:
        - <hub-hostname>  # Domain or IP of the hub. Must match the CN/SAN of the TLS certificate
      type: secret
      secret:
        name: jupyterhub-tls

  hub:
    # podSecurityContext:
    #   fsGroup: 1001

    # Database (stores passwords)
    db:
      type: sqlite-pvc
      pvc:
        storageClassName: "nfs-sc"
        accessModes: ["ReadWriteMany"]
        storage: 1Gi

    # Authenticator
    config:
      # KubeSpawner:
        # run_as_uid: 1001
      JupyterHub:
        authenticator_class: nativeauthenticator.NativeAuthenticator
        admin_access: false
      Authenticator:
        admin_users:              # JupyterHub administrator accounts
          - <admin-1-name>
        allowed_users:            # Users allowed to log in
          - <user-1-name>
          - <user-2-name>

  # Culler (destroy non-used pods)
  cull:
    enabled: false                # Enable or disable the culler
    # timeout: 86400              # Idle time in seconds before culling (24 hours)
    # every: 600                  # Frequency in seconds to check for culling (default is 600 seconds)
    # remove_named_servers: false # Set to true to cull named servers too
    # users: false                # Set to false to prevent user culling (pods will stay alive indefinitely)
    # max_age: 0                  # Set to 0 to disable maximum age-based culling

  # Image pre-puller
  prePuller:
    hook:
      enabled: false              # Don't block the Helm install on a pre-pull hook
    continuous:
      enabled: true               # Background DaemonSet pre-pulls the image on every node

  singleuser:

    uid: 1001   # Run as user with UID 1001

    # NFS
    storage:
      capacity: 10Gi
      dynamic:
        storageClass: "nfs-sc"
        pvcNameTemplate: "claim-{username}"

    # Profiles (default docker images)
    image:
      name: <docker-image-name>   # Default notebook image for every profile
      tag: <docker-image-tag>
    profileList:

      - display_name: "Entorno mínimo"
        description: "Herramientas y librerías necesarias para tratar datos."
        default: true

      - display_name: "Entorno GPU"
        description: "Herramientas y librerías necesarias para el entrenamiento e inferencia de redes neuronales."
        kubespawner_override:
          extra_resource_limits:
            nvidia.com/gpu: "1"
          # image: <another-docker-image-name>:<another-docker-image-tag>
